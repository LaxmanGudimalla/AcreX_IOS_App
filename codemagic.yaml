workflows:
  react-native-ios:
    name: React Native iOS Build
    max_build_duration: 60

    environment:
      node: 18
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install CocoaPods properly
        script: |
          cd ios
          sudo gem install cocoapods
          pod repo update
          pod install
          cd ..

      - name: Build iOS (no Metro)
        script: |
          cd ios
          xcodebuild \
            -project TempApp.xcodeproj \
            -scheme TempApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 14' \
            build

    artifacts:
      - ios/build/**