workflows:
  react-native-ios:
    name: React Native iOS Build
    max_build_duration: 60

    environment:
      node: 18
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install CocoaPods properly
        script: |
          cd ios
          pod repo update
          pod install --verbose
          ls -la
          cd ..

      - name: Build iOS (Simulator)
        script: |
          cd ios
          xcodebuild \
            -workspace TempApp.xcworkspace \
            -scheme TempApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 14' \
            build

    artifacts:
      - ios/build/**