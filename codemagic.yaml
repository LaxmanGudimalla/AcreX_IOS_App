workflows:
  react-native-ios:
    name: React Native iOS Build
    max_build_duration: 60

    environment:
      node: 18
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Build iOS (Archive for TestFlight)
        script: |
          xcodebuild \
            -workspace ios/TempApp.xcworkspace \
            -scheme TempApp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/TempApp.xcarchive archive

    artifacts:
      - build/TempApp.xcarchive