workflows:
  react-native-ios:
    name: React Native iOS Build
    max_build_duration: 60

    environment:
      node: 18
      xcode: latest

    scripts:
      - name: Install npm dependencies
        script: |
          npm install

      - name: Install CocoaPods (Fix workspace issue)
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
          cd ..

      - name: Verify workspace exists (debug step)
        script: |
          ls ios

      - name: Build iOS Archive
        script: |
          xcodebuild \
            -workspace ios/TempApp.xcworkspace \
            -scheme TempApp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/TempApp.xcarchive archive

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/TempApp.xcarchive \
            -exportOptionsPlist ios/exportOptions.plist \
            -exportPath build

    artifacts:
      - build/*.ipa