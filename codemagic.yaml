workflows:
  react-native-ios:
    name: React Native iOS Build
    max_build_duration: 60
    environment:
      node: 18
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Clean iOS build
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install
          cd ..

      - name: Build iOS
        script: |
          npx react-native run-ios --simulator="iPhone 14"

    artifacts:
      - ios/build/**/*.ipa