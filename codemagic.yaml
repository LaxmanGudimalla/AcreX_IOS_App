workflows:
  react-native-ios:
    name: React Native iOS Build
    max_build_duration: 60
    environment:
      node: 18
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..
      - name: Build iOS
        script: |
          npx react-native build-ios
    artifacts:
      - build/ios/ipa/*.ipa